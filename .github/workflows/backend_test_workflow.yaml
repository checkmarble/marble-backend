name: Test back-end

on:
  workflow_call:
    inputs:
      run-e2e:
        type: boolean
        description: Whether to run full E2E tests
        default: false
    secrets:
      LICENSE_KEY:
        description: Dummy license key to run E2E tests

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  test_backend:
    name: Test back-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Install native dependencies
        run: sudo apt update && sudo apt install -y libgeos-dev

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test ./...

      - name: Generate Marble API OpenAPI as temporary file
        run: |
          go run pubapi/openapi/generate.go v1 > /tmp/marble-api-v1.yml
          cp pubapi/openapi/v1beta.yml /tmp/marble-api-v1beta.yml

      - name: Upload OpenAPI specifications as artifacts, to be downloaded and used in the production deployment workflow
        uses: actions/upload-artifact@v7
        with:
          name: marble-api-openapi
          path: /tmp/marble-api-*.yml
          retention-days: 1

  lint_backend:
    name: Lint back-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Install native dependencies
        run: sudo apt update && sudo apt install -y libgeos-dev

      - name: Build
        run: go build -v ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          version: v2.11
          args: --timeout=3m -v

  screening_e2e:
    name: E2E Screening
    runs-on: ubuntu-latest
    if: ${{ inputs.run-e2e }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: |
            - cwd: integration_test/screening

      - run: pnpm test
        working-directory: integration_test/screening
        env:
          DEBUG: testcontainers:containers
          LICENSE_KEY: ${{ secrets.LICENSE_KEY }}

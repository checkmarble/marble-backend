name: Deploy back-end

on:
  workflow_call:
    inputs:
      environment:
        type: string
        description: "Github environment to use"
        required: true
      version:
        type: string
        description: "version to deploy"
        required: true
    secrets:
      segment_write_key_opensource:
        description: write key for segment (open source deployment)

permissions:
  contents: read
  id-token: "write" # needed for using open id token to authenticate with GCP services

jobs:
  build_and_deploy_backend:
    name: Build and deploy back-end
    environment: ${{ inputs.environment }}
    env:
      VERSION_IMAGE: europe-west1-docker.pkg.dev/marble-infra/marble/marble-backend:${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: auth github actions to GCP
        id: auth
        uses: google-github-actions/auth@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          token_format: access_token
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ vars.SERVICE_ACCOUNT_EMAIL }}

      - name: Login to Google Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: europe-west1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # BUILD_IMAGE is the artifact we promote from. Releases key it by
      # (version + sha) so a pre-release and its promoted stable release share
      # one artifact, while never colliding with the staging :<sha> build.
      - name: Compute versions
        id: version
        run: |
          REPO="europe-west1-docker.pkg.dev/marble-infra/marble/marble-backend"
          if [ "${{ inputs.version }}" = "latest" ]; then
            echo "MARBLE_VERSION=$(git describe --tags)" >> "$GITHUB_OUTPUT"
            echo "BUILD_IMAGE=${REPO}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            DISPLAY_VERSION="${{ inputs.version }}"
            DISPLAY_VERSION="${DISPLAY_VERSION%%-*}"
            echo "MARBLE_VERSION=${DISPLAY_VERSION}" >> "$GITHUB_OUTPUT"
            echo "BUILD_IMAGE=${REPO}:build-${DISPLAY_VERSION}-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image if absent
        run: |
          if docker buildx imagetools inspect ${{ steps.version.outputs.BUILD_IMAGE }} >/dev/null 2>&1; then
            echo "Build image ${{ steps.version.outputs.BUILD_IMAGE }} already exists; reusing for promotion."
          else
            docker buildx build --push \
              --build-arg MARBLE_VERSION=${{ steps.version.outputs.MARBLE_VERSION }} \
              --build-arg SEGMENT_WRITE_KEY=${{ secrets.segment_write_key_opensource }} \
              --tag ${{ steps.version.outputs.BUILD_IMAGE }} .
          fi

      - name: Tag image with release version
        run: |
          echo "Tagging ${{ steps.version.outputs.BUILD_IMAGE }} as ${{ env.VERSION_IMAGE }}"
          docker buildx imagetools create --tag ${{ env.VERSION_IMAGE }} ${{ steps.version.outputs.BUILD_IMAGE }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Deploy migration job
        run: |
          gcloud run jobs deploy migrations \
            --quiet \
            --image=${{ env.VERSION_IMAGE }} \
            --region="europe-west1" \
            --execute-now \
            --wait

      - name: Deploy server
        run: |
          gcloud run deploy marble-backend \
            --quiet \
            --image=${{ env.VERSION_IMAGE }} \
            --region="europe-west1"

      - name: Deploy analytics server
        run: |
          gcloud run deploy marble-analytics-backend \
            --quiet \
            --image=${{ env.VERSION_IMAGE }} \
            --region="europe-west1"

      - name: Deploy execute async worker service
        run: |
          gcloud run deploy marble-backend-worker \
            --quiet \
            --image=${{ env.VERSION_IMAGE }} \
            --region="europe-west1"
